name: CI Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: '*/20 * * * *'

jobs:
  unit-testing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm run test:report

      - name: Salvando relatórios de testes
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/